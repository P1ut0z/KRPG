# KRPG Local Lightweight Configuration
# 本机轻量验证配置 - 小模型、小样本、快速验证

model:
  d_model: 64
  n_heads: 2
  n_layers: 2
  d_ff: 128
  max_seq_len: 64
  dropout: 0.1

training:
  epochs: 5
  batch_size: 4
  learning_rate: 0.001
  max_length: 30

generation:
  n_sequences: 8
  temperature: 1.0
  top_k: 20
  top_p: 0.9
  max_new_tokens: 20

data:
  n_samples: 5
  use_default: true

device: cpu
